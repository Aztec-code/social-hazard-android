map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.fluxcloud.dev;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.fluxcloud.dev;

    ssl_certificate /etc/letsencrypt/live/api.fluxcloud.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.fluxcloud.dev/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SocialHazardSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 1m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8081/health;
    }

    location = /ws {
        proxy_pass http://127.0.0.1:8081/ws;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location / {
        return 404;
    }
}
